<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Caça-palavras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- menu -->
  <div id="menu">
    <h1 class="titulo">Caça-palavras</h1>

    <input type="text" id="nome" placeholder="Digite seu nome">

    <button id="btnJogar">Começar</button>
    <button id="btnTop">Top 10</button>

    <div id="ranking" class="hidden"></div>
  </div>

  <!-- joguinho -->
  <div id="jogo" class="hidden">

    <div class="topo">

      <span id="pontos">0</span>
      <h1 class="titulo-jogo">Caça-palavras</h1>

      <div class="menu-container">
        <div class="menu-icon">☰</div>

        <div id="menuDrop" class="menu-drop hidden">
          <button id="btnSair">Sair</button>
        </div>
      </div>
      
    </div>

    <div id="palavras"></div>

    <div id="grid"></div>
  </div>

  <!-- final da fase -->
  <div id="fim" class="hidden">
    <h2>É isso aí!</h2>
    <button id="proximo">Próximo</button>
  </div>

  <!-- última tela -->
  <div id="final" class="hidden">
    <h1>Parabéns!</h1>
    <p id="mensagemFinal"></p>

    <button id="reiniciar">Jogar novamente</button>
  </div>



  <script src="script.js"></script>


</body>
</html>
